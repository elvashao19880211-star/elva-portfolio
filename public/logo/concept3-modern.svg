<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="qingGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F9EAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#358A96;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形标志 -->
  <circle cx="100" cy="80" r="42" fill="#F5F3EE" stroke="#3F9EAC" stroke-width="1.5"/>
  <circle cx="100" cy="80" r="38" fill="none" stroke="#3F9EAC" stroke-width="0.5" opacity="0.3"/>

  <!-- 纹样装饰—内圈联珠 -->
  <circle cx="100" cy="50" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="112" cy="54" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="120" cy="66" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="122" cy="80" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="120" cy="94" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="112" cy="106" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="100" cy="110" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="88" cy="106" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="80" cy="94" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="78" cy="80" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="80" cy="66" r="2" fill="#3F9EAC" opacity="0.4"/>
  <circle cx="88" cy="54" r="2" fill="#3F9EAC" opacity="0.4"/>

  <!-- 中间"河图"缩写 H+T 艺术字 -->
  <!-- H -->
  <line x1="84" y1="62" x2="84" y2="98" stroke="#3F9EAC" stroke-width="3" stroke-linecap="round"/>
  <line x1="84" y1="80" x2="100" y2="80" stroke="#3F9EAC" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="62" x2="100" y2="98" stroke="#3F9EAC" stroke-width="3" stroke-linecap="round"/>
  <!-- T -->
  <line x1="108" y1="62" x2="116" y2="62" stroke="#C3A370" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="62" x2="112" y2="98" stroke="#C3A370" stroke-width="3" stroke-linecap="round"/>

  <!-- 下方的弧线装饰 -->
  <path d="M62 95 Q100 120 138 95" fill="none" stroke="#9CA3AF" stroke-width="0.8" opacity="0.3"/>

  <!-- 底部品牌名 -->
  <text x="100" y="155" text-anchor="middle"
        font-family="'Noto Serif SC', 'STSong', serif"
        font-size="28" font-weight="600" fill="#3F9EAC">
    河图
  </text>
  <text x="100" y="178" text-anchor="middle"
        font-family="'Noto Sans SC', sans-serif"
        font-size="8" fill="#9CA3AF" letter-spacing="2">
    华 夏 纹 样 传 承
  </text>
</svg>
