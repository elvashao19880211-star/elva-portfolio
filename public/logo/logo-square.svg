<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="qingGradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F9EAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#358A96;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 底色圆（米白底） -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#F5F3EE"/>

  <!-- 印章外框 -->
  <rect x="18" y="18" width="164" height="164" rx="12" fill="none" stroke="#3F9EAC" stroke-width="2.5"/>
  <rect x="26" y="26" width="148" height="148" rx="8" fill="none" stroke="#C3A370" stroke-width="1" opacity="0.4"/>

  <!-- 回纹装饰 — 简化四角纹样 -->
  <g fill="none" stroke="#C3A370" stroke-width="1.5" opacity="0.5">
    <path d="M32 34 L32 48 L46 48 L46 55 L32 55 L32 66"/>
    <path d="M168 34 L168 48 L154 48 L154 55 L168 55 L168 66"/>
    <path d="M32 166 L32 152 L46 152 L46 145 L32 145 L32 134"/>
    <path d="M168 166 L168 152 L154 152 L154 145 L168 145 L168 134"/>
  </g>

  <!-- "河"字 -->
  <text x="100" y="95" text-anchor="middle" dominant-baseline="central"
        font-family="'Noto Serif SC', 'STKaiti', 'KaiTi', serif"
        font-size="52" font-weight="600" fill="url(#qingGradS)">
    河
  </text>

  <!-- "图"字 -->
  <text x="100" y="140" text-anchor="middle" dominant-baseline="central"
        font-family="'Noto Serif SC', 'STKaiti', 'KaiTi', serif"
        font-size="44" font-weight="400" fill="#C3A370">
    图
  </text>
</svg>
