<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="qingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F9EAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A506B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C3A370;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8874E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 外圆环 -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#qingGrad)" stroke-width="2.5" opacity="0.3"/>

  <!-- 装饰圆点（河图洛书意象） -->
  <!-- 外圈白点 -->
  <circle cx="100" cy="30" r="3.5" fill="#3F9EAC"/>
  <circle cx="100" cy="170" r="3.5" fill="#3F9EAC"/>
  <circle cx="30" cy="100" r="3.5" fill="#3F9EAC"/>
  <circle cx="170" cy="100" r="3.5" fill="#3F9EAC"/>

  <!-- 斜向点 -->
  <circle cx="45" cy="45" r="2.5" fill="#C3A370" opacity="0.6"/>
  <circle cx="155" cy="155" r="2.5" fill="#C3A370" opacity="0.6"/>
  <circle cx="155" cy="45" r="2.5" fill="#C3A370" opacity="0.6"/>
  <circle cx="45" cy="155" r="2.5" fill="#C3A370" opacity="0.6"/>

  <!-- 中间圆环（太极意象） -->
  <circle cx="100" cy="100" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="25" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- 中心"河"字 -->
  <text x="100" y="95" text-anchor="middle" dominant-baseline="central"
        font-family="'Noto Serif SC', 'STSong', 'SimSun', serif"
        font-size="36" font-weight="600" fill="url(#qingGrad)">
    河
  </text>
  <text x="100" y="130" text-anchor="middle" dominant-baseline="central"
        font-family="'Noto Serif SC', 'STSong', 'SimSun', serif"
        font-size="28" font-weight="400" fill="url(#goldGrad)">
    图
  </text>

  <!-- 底部小字 -->
  <text x="100" y="185" text-anchor="middle"
        font-family="'Noto Sans SC', sans-serif"
        font-size="7" fill="#9CA3AF" letter-spacing="3">
    华夏纹样传承
  </text>
</svg>
